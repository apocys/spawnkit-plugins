<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SpawnKit Plugins</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 380px;
    min-height: 480px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f0f14;
    color: #d4d4d8;
    font-size: 13px;
  }

  /* ── Header ──────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .header .logo { font-size: 18px; }
  .header .title { font-weight: 600; font-size: 14px; color: #e4e4e7; flex: 1; }
  .site-badge {
    font-size: 11px;
    color: #71717a;
    background: rgba(255,255,255,0.05);
    padding: 2px 8px;
    border-radius: 4px;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Chat ─────────────────────────────────── */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 200px;
    max-height: 300px;
  }

  .msg {
    padding: 8px 12px;
    border-radius: 10px;
    max-width: 90%;
    line-height: 1.4;
    font-size: 13px;
    word-wrap: break-word;
  }
  .msg.user {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg.ai {
    background: rgba(255,255,255,0.06);
    color: #a1a1aa;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.ai.success { color: #86efac; }
  .msg.ai.offline { color: #fcd34d; }
  .msg.error {
    background: rgba(239,68,68,0.1);
    color: #fca5a5;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    font-size: 12px;
  }
  .msg .op-count { font-weight: 600; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 30px 20px;
    color: #52525b;
    text-align: center;
  }
  .empty-state .icon { font-size: 24px; opacity: 0.5; }
  .empty-state p { font-size: 12px; line-height: 1.4; }

  /* ── Loading indicator ───────────────────── */
  .loading {
    display: none;
    padding: 10px 14px;
    flex-direction: column;
    gap: 6px;
  }
  .loading.active { display: flex; }
  .loading-bar {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }
  .loading-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #667eea, #a78bfa, #667eea);
    background-size: 200% 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .loading-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .loading-text {
    font-size: 11px;
    color: #818cf8;
  }
  .loading-timer {
    font-size: 11px;
    color: #52525b;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  /* ── Input area ──────────────────────────── */
  .input-area {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.3);
  }
  .input-area input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 8px 12px;
    color: #e4e4e7;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area input:focus {
    border-color: #667eea;
  }
  .input-area input::placeholder { color: #52525b; }
  .input-area input:disabled { opacity: 0.5; }

  .pick-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
  }
  .pick-btn:hover {
    background: rgba(102,126,234,0.2);
    border-color: #667eea;
  }
  .pick-btn.active {
    background: rgba(102,126,234,0.3);
    border-color: #667eea;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(102,126,234,0.4); }
    50% { box-shadow: 0 0 0 4px rgba(102,126,234,0); }
  }

  .send-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .send-btn:hover { opacity: 0.9; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Action buttons ──────────────────────── */
  .actions {
    display: flex;
    gap: 4px;
    padding: 8px 14px;
    border-top: 1px solid rgba(255,255,255,0.04);
    flex-wrap: wrap;
  }
  .actions button {
    flex: 1;
    min-width: 60px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 6px 8px;
    color: #a1a1aa;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }
  .actions button:hover {
    background: rgba(255,255,255,0.1);
    color: #e4e4e7;
  }
  .actions button.danger:hover {
    background: rgba(239,68,68,0.15);
    color: #fca5a5;
    border-color: rgba(239,68,68,0.3);
  }
  .actions button.undo:hover {
    background: rgba(251,191,36,0.15);
    color: #fcd34d;
    border-color: rgba(251,191,36,0.3);
  }

  /* ── Status bar ──────────────────────────── */
  /* ── Presets ───────────────────────────── */
  .presets-section {
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .presets-toggle {
    width: 100%;
    background: none;
    border: none;
    color: #71717a;
    padding: 8px 14px;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }
  .presets-toggle:hover { color: #a1a1aa; }
  .toggle-arrow { transition: transform 0.2s; font-size: 10px; }
  .toggle-arrow.open { transform: rotate(90deg); }
  .presets-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    padding: 0 14px 10px;
  }
  .preset-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 8px 10px;
    color: #a1a1aa;
    font-size: 11px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    line-height: 1.3;
  }
  .preset-btn:hover {
    background: rgba(102,126,234,0.12);
    border-color: rgba(102,126,234,0.3);
    color: #e4e4e7;
  }
  .preset-btn.applied {
    background: rgba(102,126,234,0.15);
    border-color: rgba(102,126,234,0.4);
    color: #a5b4fc;
  }
  .preset-btn .preset-name { font-weight: 500; }
  .preset-btn .preset-desc { font-size: 10px; color: #52525b; margin-top: 2px; }

  .status-bar {
    height: 22px;
    padding: 0 14px;
    font-size: 11px;
    color: #52525b;
    display: flex;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.04);
    transition: color 0.3s;
  }
  .status-bar.success { color: #86efac; }
  .status-bar.error { color: #fca5a5; }
</style>
</head>
<body>
  <div class="header">
    <span class="logo">🧩</span>
    <span class="title">SpawnKit Plugins</span>
    <span class="site-badge" id="site-label">—</span>
  </div>

  <div class="chat-container" id="chat-log">
    <div class="empty-state" id="empty-state">
      <span class="icon">✨</span>
      <p>Describe a style change in plain English.<br>
      <em>"Make it dark"</em> · <em>"Hide the sidebar"</em> · <em>"Bigger font"</em></p>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-bar">
      <div class="loading-fill" id="loading-fill"></div>
    </div>
    <div class="loading-row">
      <div class="loading-text" id="loading-text">Analyzing page...</div>
      <div class="loading-timer" id="loading-timer">0.0s</div>
    </div>
  </div>

  <div class="input-area">
    <button class="pick-btn" id="pick-btn" title="Pick an element from the page">🎯</button>
    <input type="text" id="prompt-input" placeholder="Describe your change..." autofocus>
    <button class="send-btn" id="send-btn">Send</button>
  </div>

  <div class="actions">
    <button id="btn-undo" class="undo" title="Undo all changes">↩ Undo</button>
    <button id="btn-save" title="Save config for this site">💾 Save</button>
    <button id="btn-load" title="Load saved config">📂 Load</button>
    <button id="btn-export" title="Export all configs">📦 Export</button>
    <button id="btn-import" title="Import configs from file">📥 Import</button>
    <button id="btn-erase" class="danger" title="Delete config for this site">🗑 Erase</button>
  </div>

  <div class="presets-section" id="presets-section">
    <button class="presets-toggle" id="presets-toggle">⚡ Presets <span class="toggle-arrow">▸</span></button>
    <div class="presets-grid" id="presets-grid" style="display:none;"></div>
  </div>

  <div class="status-bar" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
